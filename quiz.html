<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Selector de Lenguaje</title>

    <!-- Estilos Vanilla -->
    <link rel="stylesheet" href="quiz-style.css">
</head>

<body>
    <div class="fondo-gradiente">
        <div class="contenedor-principal" style="margin-bottom: 2rem;">
            <button class="boton-volver" onclick="window.location.href='index.html'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Volver al Inicio
            </button>
        </div>
        <header style="text-align: center; margin-bottom: 4rem;">
            <h1 style="font-size: 3.5rem; letter-spacing: -0.1rem;">Christopher <span class="texto-degradado">Quiz

            <p style="color: var(--color-slate-500); font-size: 1.1rem; margin-top: 1rem;">Selecciona tu lenguaje para
                comenzar el desafío</p>
        </header>

        <div class="grid-menu">
            <!-- Java -->
            <a href="java.html" class="tarjeta-cristal">
                <div
                    style="width: 60px; height: 60px; background: rgba(249, 115, 22, 0.1); color: #f97316; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(249, 115, 22, 0.2);">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Java</h3>
                <p style="font-size: 0.85rem; color: var(--color-slate-500); line-height: 1.5;">Manejo de excepciones,
                    POO y sintaxis robusta.</p>
            </a>

            <!-- Python -->
            <a href="python.html" class="tarjeta-cristal">
                <div
                    style="width: 60px; height: 60px; background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(59, 130, 246, 0.2);">

                <p style="font-size: 0.85rem; color: var(--color-slate-500); line-height: 1.5;">Identación,
                    comprensiones y legibilidad.</p>
            </a>

            <!-- C++ -->
            <a href="cpp.html" class="tarjeta-cristal">
                <div
                    style="width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); color: #6366f1; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(99, 102, 241, 0.2);">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </div>
                <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">C++</h3>
                <p style="font-size: 0.85rem; color: var(--color-slate-500); line-height: 1.5;">Punteros, memoria y
                    eficiencia pura.</p>
            </a>

            <a href="javascript.html" class="tarjeta-cristal">

                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">JavaScript</h3>
