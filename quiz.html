<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Selector de Lenguaje</title>

    <!-- Estilos Vanilla -->
    <link rel="stylesheet" href="quiz-style.css">
</head>

<body>
    <div class="fondo-gradiente">
        <div class="contenedor-principal" style="margin-bottom: 2rem;">
            <button class="boton-volver" onclick="window.location.href='index.html'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Volver al Inicio
            </button>
        </div>
        <header style="text-align: center; margin-bottom: 4rem;">
            <h1 style="font-size: 3.5rem; letter-spacing: -0.1rem; font-weight: 800;">
                DevPulse <span class="texto-degradado">Quiz Master</span>
            </h1>
            <p style="color: var(--color-text-dim); font-size: 1.1rem; margin-top: 1rem;">
                Selecciona tu lenguaje para comenzar el desafío
            </p>
        </header>

        <div class="grid-menu" style="grid-template-columns: repeat(2, 1fr); max-width: 800px; margin: 0 auto; gap: 2rem;">
            <!-- C++ -->
            <a href="cpp.html" class="tarjeta-cristal">
                <div style="width: 64px; height: 64px; background: rgba(99, 102, 241, 0.1); color: #6366f1; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(99, 102, 241, 0.2);">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </div>
                <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: white;">C++</h3>
                <p style="font-size: 0.9rem; color: var(--color-text-dim); line-height: 1.5;">Punteros, memoria y eficiencia pura.</p>
            </a>

            <!-- JavaScript -->
            <a href="javascript.html" class="tarjeta-cristal">
                <div style="width: 64px; height: 64px; background: rgba(234, 179, 8, 0.1); color: #eab308; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(234, 179, 8, 0.2);">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: white;">JavaScript</h3>
                <p style="font-size: 0.9rem; color: var(--color-text-dim); line-height: 1.5;">Asincronía, DOM y tipos dinámicos.</p>
            </a>
        </div>
    </div>
</body>

</html>
